<style>
:root {
--bg-main: #09090b;
--glass: rgba(24, 24, 27, 0.85);
--accent: #007aff;
--ui-border: 1px solid rgba(255, 255, 255, 0.08);
--text-main: #ffffff;
}

* {
box-sizing: border-box;
margin: 0;
padding: 0;
user-select: none;
-webkit-user-select: none;
-webkit-touch-callout: none;
-webkit-tap-highlight-color: transparent;
}

html, body {
width: 100%;
height: 100%;
overflow: hidden;
background-color: var(--bg-main);
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
color: var(--text-main);
}

.app-container {
width: 100%;
height: 100%;
position: relative;
}

/* Pantalla de Carga */
.splash-screen {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: var(--bg-main);
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
z-index: 999;
transition: opacity 0.5s ease;
}
.splash-logo { width: 120px; height: 120px; border-radius: 24px; object-fit: cover; box-shadow: 0 10px 30px rgba(0,122,255,0.3); animation: pulse 2s infinite; }
.splash-text { margin-top: 20px; font-size: 14px; letter-spacing: 3px; text-transform: uppercase; opacity: 0.8; font-weight: 600; }
@keyframes pulse { 0%, 100% { transform: scale(0.98); } 50% { transform: scale(1.02); } }

/* Botón Start */
.btn-start {
margin-top: 30px;
padding: 14px 40px;
font-size: 16px;
font-weight: 700;
letter-spacing: 2px;
color: #ffffff;
background: linear-gradient(135deg, #007aff, #0056b3);
border: none;
border-radius: 20px;
cursor: pointer;
box-shadow: 0 6px 20px rgba(0, 122, 255, 0.4);
transition: transform 0.2s, box-shadow 0.2s;
animation: fadeIn 1s ease;
}
.btn-start:active {
transform: scale(0.95);
box-shadow: 0 3px 10px rgba(0, 122, 255, 0.2);
}
@keyframes fadeIn {
from { opacity: 0; transform: translateY(10px); }
to { opacity: 1; transform: translateY(0); }
}

canvas {
display: block;
width: 100%;
height: 100%;
position: absolute;
top: 0;
left: 0;
touch-action: none;
z-index: 1;
cursor: crosshair;
}

/* Paneles de Interfaz */
.top-bar {
position: absolute;
top: calc(15px + env(safe-area-inset-top));
left: 50%;
transform: translateX(-50%);
width: 95%;
max-width: 420px;
background: var(--glass);
backdrop-filter: blur(24px);
-webkit-backdrop-filter: blur(24px);
border-radius: 30px;
padding: 8px 12px;
display: flex;
justify-content: space-between;
align-items: center;
box-shadow: 0 4px 24px rgba(0,0,0,0.3);
z-index: 10;
border: var(--ui-border);
transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s;
}

.toolbar {
position: absolute;
bottom: calc(15px + env(safe-area-inset-bottom));
left: 50%;
transform: translateX(-50%);
width: 92%;
max-width: 440px;
background: var(--glass);
backdrop-filter: blur(25px);
-webkit-backdrop-filter: blur(25px);
border-radius: 28px;
padding: 16px;
display: flex;
flex-direction: column;
gap: 12px;
box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
z-index: 10;
border: var(--ui-border);
transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s;
}

/* Clases para ocultar menús */
.toolbar.hidden { transform: translate(-50%, 150%); opacity: 0; pointer-events: none; }
.top-bar.hidden { transform: translate(-50%, -200%); opacity: 0; pointer-events: none; }

.tools-grid {
display: flex;
gap: 6px;
width: 100%;
justify-content: space-between;
}
.tools-grid .btn-tool {
flex: 1;
padding: 0;
white-space: nowrap;
font-size: 11px;
}

.interface-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; width: 100%; }

/* Botón Flotante para Restaurar UI */
.btn-restore-ui {
position: absolute;
bottom: calc(25px + env(safe-area-inset-bottom));
right: 20px;
background: rgba(0, 122, 255, 0.9);

padding: 12px 20px;
border-radius: 25px;
font-size: 14px;
font-weight: 700;
border: var(--ui-border);
box-shadow: 0 8px 24px rgba(0,0,0,0.5);
z-index: 50;
display: none;
align-items: center;
gap: 8px;
cursor: pointer;
transition: transform 0.2s;
}
.btn-restore-ui:active { transform: scale(0.95); }

/* Guía de Asistencia */

.guide-close { cursor: pointer; color: #ff4757; font-weight: bold; font-size: 18px; padding: 0 4px; }

/* Selector de Bocetos */
.sketch-selector {
display: none;
position: absolute;
bottom: 240px;
left: 50%;
transform: translateX(-50%);
width: 94%;
max-width: 400px;
max-height: 320px;
overflow-y: auto;
background: rgba(32, 32, 35, 0.98);
backdrop-filter: blur(24px);
border-radius: 24px;
padding: 16px;
z-index: 11;
box-shadow: 0 10px 30px rgba(0,0,0,0.5);
border: var(--ui-border);
grid-template-columns: repeat(3, 1fr);
gap: 8px;
}
.sketch-section-title { grid-column: span 3; color: var(--accent); font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin: 8px 0 4px 4px; }
.sketch-option { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 10px 4px; text-align: center; cursor: pointer; transition: 0.2s; }
.sketch-option:active { background: var(--accent); }
.sketch-option span { display: block; font-size: 18px; margin-bottom: 4px; }
.sketch-option label { font-size: 9.5px; font-weight: 600; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Paleta y Deslizadores */
.color-palette { display: flex; gap: 8px; align-items: center; }
.color-swatch { width: 32px; height: 32px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: transform 0.2s; }
.color-swatch.active { transform: scale(1.15); border-color: #ffffff; }
.color-picker-wrapper { width: 32px; height: 32px; border-radius: 50%; overflow: hidden; position: relative; border: 1px solid rgba(255,255,255,0.3); background: linear-gradient(45deg, red, orange, yellow, green, blue, purple); }

.sliders-group { display: flex; flex-direction: column; gap: 10px; flex: 1; background: rgba(255,255,255,0.04); padding: 10px 14px; border-radius: 18px; }
.slider-item { display: flex; align-items: center; gap: 10px; width: 100%; }
.slider-label { color: white; font-size: 12px; opacity: 0.6; width: 16px; text-align: center; }
.input-slider { flex: 1; -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.15); outline: none; }
.input-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 20px; height: 20px; border-radius: 50%; background: white; box-shadow: 0 2px 6px rgba(0,0,0,0.4); }

.indicator-panel { display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; }
.brush-preview { width: 12px; height: 12px; background: #1e272e; border-radius: 50%; transition: transform 0.1s; }

/* Estilos de Botones */
.btn { border: none; color: white; font-size: 13px; font-weight: 600; border-radius: 14px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
.btn:active { transform: scale(0.95); }
.btn-top { height: 36px; width: 36px; border-radius: 50%; font-size: 15px; background: transparent; }
.btn-top:disabled { opacity: 0.2; pointer-events: none; }

.btn-tool { height: 40px; padding: 0 8px; gap: 4px; border-radius: 12px; font-size: 11.5px; background: rgba(255, 255, 255, 0.08); color: rgba(255, 255, 255, 0.9); }
.btn-tool.active { background: var(--accent) !important; color: white !important; box-shadow: 0 4px 12px rgba(0,122,255,0.4) !important; border: none !important; }

.btn-bocetos { background: rgba(0, 122, 255, 0.2); color: #66b2ff; }

.btn-action { flex: 1; height: 44px; border-radius: 16px; font-size: 13px; gap: 6px; }
.btn-eraser { background: rgba(255,255,255,0.1); }
.btn-clear { background: rgba(255,71,87,0.15); color: #ff6b81; }
.btn-save { background: var(--accent); }

.toast { position: absolute; top: 130px; left: 50%; transform: translate(-50%, -60px); background: white; color: #09090b; padding: 12px 24px; border-radius: 30px; font-size: 13px; font-weight: 700; box-shadow: 0 10px 25px rgba(0,0,0,0.3); opacity: 0; z-index: 100; pointer-events: none; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
.toast.show { transform: translate(-50%, 0); opacity: 1; }
</style>
</head>

<script>
console.log("Cian Arte Studio: JS Iniciado correctamente");

document.getElementById('btn-start').addEventListener('click', () => {
const splash = document.getElementById('splash');
splash.style.opacity = '0';
setTimeout(() => splash.style.display = 'none', 500);
});

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const toolbar = document.getElementById('toolbar');
const topBar = document.getElementById('top-bar');
const btnRestoreUi = document.getElementById('btn-restore-ui');
const btnHideUi = document.getElementById('btn-hide-ui');

const sizeSlider = document.getElementById('size-slider');
const opacitySlider = document.getElementById('opacity-slider');
const brushPreview = document.getElementById('brush-preview');
const btnEraser = document.getElementById('btn-eraser');
const btnClear = document.getElementById('btn-clear');
const btnSave = document.getElementById('btn-save');
const btnUndo = document.getElementById('btn-undo');
const btnRedo = document.getElementById('btn-redo');
const customColor = document.getElementById('custom-color');
const colorSwatches = document.querySelectorAll('.color-swatch');
const toast = document.getElementById('toast');

const btnSketches = document.getElementById('btn-sketches');
const sketchSelector = document.getElementById('sketch-selector');
const guideBox = document.getElementById('guide-box');
const guideTitle = document.getElementById('guide-title');
const guideText = document.getElementById('guide-text');
const guideClose = document.getElementById('guide-close');

let currentAppMode = 'draw';
let currentShapeMode = 'free';
let symmetryActive = false;
let currentLayer = 'B';
let paperStyleIndex = 0;
let isZenMode = false; // Control de UI Oculta

let isDrawing = false;
let isEraser = false;
let currentColor = '#1e272e';
let currentSize = 8;
let currentOpacity = 1;

let points = [];
let lastX = 0, lastY = 0;

let panX = 0, panY = 0;
let startPanX = 0, startPanY = 0;

let sketchCv = document.createElement('canvas');
let sketchCtx = sketchCv.getContext('2d');
let currentSketch = { type: null, x: 0, y: 0, scale: 1 };
let isDraggingSketch = false;
let isPinching = false;
let initialPinchDist = 0;
let initialSketchScale = 1;

let layerACv = document.createElement('canvas');
let layerBCv = document.createElement('canvas');
let layerACtx = layerACv.getContext('2d');
let layerBCtx = layerBCv.getContext('2d');

let undoStack = [];
let redoStack = [];
const MAX_HISTORY = 10;

const STORAGE_KEY_A = "cian_studio_layer_a";
const STORAGE_KEY_B = "cian_studio_layer_b";

const guideData = {
anime: { title: "Rostro Manga", text: "Estructura geométrica estilizada de la cabeza con mandíbula en V." },
realista: { title: "Rostro Realista", text: "Proporciones anatómicas basadas en tercios simétricos." },
chibi: { title: "Rostro Chibi", text: "Facciones simplificadas con frentes amplias y redondas." },
eyeEsfera: { title: "E. Esférica", text: "El ojo es una esfera. Los párpados envuelven la bola." },
eyeFrente: { title: "Ojos de Frente", text: "Distancia perfecta: entre ambos ojos cabe un tercer ojo invisible." },
eyeTresCuartos: { title: "Perspectiva 3/4", text: "El ojo más lejano reduce su ancho a la mitad por escorzo." },
eyePerfil: { title: "Ojo de Perfil", text: "El ojo toma forma de triángulo o cono." },
eyeArriba: { title: "Hacia Arriba", text: "El párpado superior se curva y se eleva casi por completo." },
eyeAbajo: { title: "Hacia Abajo", text: "El párpado superior desciende tapando la esfera ocular." },
eyeMacroIris: { title: "Detalle: Iris", text: "Coloca un brillo primario grande y reflejos secundarios." }
};

window.addEventListener('DOMContentLoaded', () => {
resizeCanvas();
loadLocalStorageBackup();
});

function resizeCanvas() {
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
sketchCv.width = canvas.width;
sketchCv.height = canvas.height;
if (layerACv.width !== canvas.width) {
initLayer(layerACv, layerACtx);
initLayer(layerBCv, layerBCtx);
saveState();
}
redrawSketchLayer();
renderAll();
}

function initLayer(c, context) {
c.width = canvas.width;
c.height = canvas.height;
context.lineCap = 'round';
context.lineJoin = 'round';
}

function renderAll() {
ctx.clearRect(0, 0, canvas.width, canvas.height);
ctx.save();
ctx.translate(panX, panY);
drawPaperBackground();
ctx.drawImage(sketchCv, 0, 0);
ctx.drawImage(layerACv, 0, 0);
ctx.drawImage(layerBCv, 0, 0);
ctx.restore();
updateBrushSettings();
}

function drawPaperBackground() {
if (paperStyleIndex === 0) { ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, canvas.width, canvas.height); }
else if (paperStyleIndex === 1) {
ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, canvas.width, canvas.height);
ctx.strokeStyle = 'rgba(0, 0, 0, 0.06)'; ctx.lineWidth = 1;
for (let x = 0; x < canvas.width; x += 30) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
for (let y = 0; y < canvas.height; y += 30) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); }
} else if (paperStyleIndex === 2) { ctx.fillStyle = '#f5ebd6'; ctx.fillRect(0, 0, canvas.width, canvas.height); }
else if (paperStyleIndex === 3) { ctx.fillStyle = '#1e1e24'; ctx.fillRect(0, 0, canvas.width, canvas.height); }
}

function redrawSketchLayer() {
sketchCtx.clearRect(0, 0, canvas.width, canvas.height);
if (!currentSketch.type) return;

sketchCtx.save();
sketchCtx.translate(currentSketch.x, currentSketch.y);
sketchCtx.scale(currentSketch.scale, currentSketch.scale);
sketchCtx.strokeStyle = 'rgba(0, 122, 255, 0.42)';
sketchCtx.lineWidth = 2.5 / currentSketch.scale;
sketchCtx.setLineDash([6 / currentSketch.scale, 5 / currentSketch.scale]);

const type = currentSketch.type;
if (type === 'anime') {
sketchCtx.beginPath(); sketchCtx.arc(0, -10, 85, 0, 2 * Math.PI); sketchCtx.stroke();
sketchCtx.beginPath(); sketchCtx.moveTo(-85, -10); sketchCtx.lineTo(0, 120); sketchCtx.lineTo(85, -10); sketchCtx.stroke();
sketchCtx.beginPath(); sketchCtx.moveTo(0, -110); sketchCtx.lineTo(0, 130); sketchCtx.stroke();
} else if (type === 'realista') {
sketchCtx.beginPath(); sketchCtx.ellipse(0, 0, 90, 130, 0, 0, 2 * Math.PI); sketchCtx.stroke();
sketchCtx.beginPath(); sketchCtx.moveTo(0, -140); sketchCtx.lineTo(0, 140); sketchCtx.stroke();
sketchCtx.beginPath(); sketchCtx.moveTo(-90, -40); sketchCtx.lineTo(90, -40); sketchCtx.stroke();
} else if (type === 'chibi') {
sketchCtx.beginPath(); sketchCtx.arc(0, -45, 75, 0, 2 * Math.PI); sketchCtx.stroke();
sketchCtx.beginPath(); sketchCtx.ellipse(0, 60, 32, 45, 0, 0, 2 * Math.PI); sketchCtx.stroke();
} else if (type === 'eyeEsfera') {
sketchCtx.beginPath(); sketchCtx.arc(0, 0, 85, 0, 2 * Math.PI); sketchCtx.stroke();
sketchCtx.beginPath(); sketchCtx.moveTo(-115, 0); sketchCtx.lineTo(115, 0); sketchCtx.stroke();
sketchCtx.beginPath(); sketchCtx.moveTo(0, -115); sketchCtx.lineTo(0, 115); sketchCtx.stroke();
sketchCtx.beginPath(); sketchCtx.moveTo(-85, 5); sketchCtx.quadraticCurveTo(0, -60, 80, -5); sketchCtx.stroke();
sketchCtx.beginPath(); sketchCtx.moveTo(-85, 5); sketchCtx.quadraticCurveTo(0, 55, 80, -5); sketchCtx.stroke();
sketchCtx.beginPath(); sketchCtx.arc(-85, 4, 6, 0, 2 * Math.PI); sketchCtx.stroke();
} else if (type === 'eyeFrente') {
sketchCtx.strokeRect(-135, -35, 75, 65); sketchCtx.strokeRect(60, -35, 75, 65);
sketchCtx.beginPath(); sketchCtx.moveTo(-160, 0); sketchCtx.lineTo(160, 0); sketchCtx.stroke();
sketchCtx.beginPath(); sketchCtx.arc(-97, 0, 20, 0, 2 * Math.PI); sketchCtx.stroke();
sketchCtx.beginPath(); sketchCtx.arc(97, 0, 20, 0, 2 * Math.PI); sketchCtx.stroke();
} else if (type === 'eyeTresCuartos') {
sketchCtx.strokeRect(-110, -35, 80, 65); sketchCtx.strokeRect(35, -35, 45, 65);
sketchCtx.beginPath(); sketchCtx.ellipse(-70, 0, 22, 22, 0, 0, 2 * Math.PI); sketchCtx.stroke();
sketchCtx.beginPath(); sketchCtx.ellipse(57, 0, 11, 22, 0, 0, 2 * Math.PI); sketchCtx.stroke();
} else if (type === 'eyePerfil') {
sketchCtx.beginPath(); sketchCtx.moveTo(-40, -65); sketchCtx.lineTo(25, 0); sketchCtx.lineTo(-40, 55); sketchCtx.closePath(); sketchCtx.stroke();
sketchCtx.beginPath(); sketchCtx.ellipse(25, -5, 12, 38, 0, 0, 2 * Math.PI); sketchCtx.stroke();
} else if (type === 'eyeArriba') {
sketchCtx.beginPath(); sketchCtx.moveTo(-85, 15); sketchCtx.quadraticCurveTo(0, -75, 80, 15); sketchCtx.stroke();
sketchCtx.beginPath(); sketchCtx.moveTo(-85, 15); sketchCtx.quadraticCurveTo(0, 30, 80, 15); sketchCtx.stroke();
sketchCtx.beginPath(); sketchCtx.arc(0, -20, 24, 0, 2 * Math.PI); sketchCtx.stroke();
} else if (type === 'eyeAbajo') {
sketchCtx.beginPath(); sketchCtx.moveTo(-85, -15); sketchCtx.quadraticCurveTo(0, 20, 80, -15); sketchCtx.stroke();
sketchCtx.beginPath(); sketchCtx.moveTo(-85, -15); sketchCtx.quadraticCurveTo(0, 55, 80, -15); sketchCtx.stroke();
sketchCtx.beginPath(); sketchCtx.arc(0, 20, 24, 0, 2 * Math.PI); sketchCtx.stroke();
} else if (type === 'eyeMacroIris') {
sketchCtx.beginPath(); sketchCtx.arc(0, 0, 120, 0, 2 * Math.PI); sketchCtx.stroke();
sketchCtx.beginPath(); sketchCtx.arc(0, 0, 40, 0, 2 * Math.PI); sketchCtx.stroke();
sketchCtx.beginPath(); sketchCtx.arc(45, -45, 18, 0, 2 * Math.PI); sketchCtx.stroke();
sketchCtx.beginPath(); sketchCtx.arc(-50, 50, 10, 0, 2 * Math.PI); sketchCtx.stroke();
}
sketchCtx.restore();
}

// SISTEMA DE OCULTAMIENTO DE INTERFAZ (MODO ZEN)
btnHideUi.addEventListener('click', () => {
isZenMode = true;
topBar.classList.add('hidden');
toolbar.classList.add('hidden');
sketchSelector.style.display = 'none';
guideBox.style.display = 'none';
btnRestoreUi.style.display = 'flex';
showToast("Modo Zen Activado");
});

btnRestoreUi.addEventListener('click', () => {
isZenMode = false;
topBar.classList.remove('hidden');
toolbar.classList.remove('hidden');
btnRestoreUi.style.display = 'none';
});

btnSketches.addEventListener('click', (e) => { e.stopPropagation(); sketchSelector.style.display = sketchSelector.style.display === 'grid' ? 'none' : 'grid'; });
document.querySelectorAll('.sketch-option').forEach(option => {
option.addEventListener('click', (e) => {
e.stopPropagation(); const style = option.getAttribute('data-style'); sketchSelector.style.display = 'none';
if (style === 'clear') {
currentSketch.type = null; redrawSketchLayer(); renderAll();
guideBox.style.display = 'none'; showToast("Plantilla limpiada"); setAppMode('draw');
} else {
currentSketch.type = style;
currentSketch.x = canvas.width / 2;
currentSketch.y = canvas.height / 2 - 40;
currentSketch.scale = 1;
redrawSketchLayer(); renderAll();
guideTitle.innerText = guideData[style].title; guideText.innerText = guideData[style].text; guideBox.style.display = 'block';
currentLayer = 'B'; document.getElementById('btn-layer-toggle').innerText = "Capa: B"; updateBrushSettings();
setAppMode('sketch'); showToast("Modo Mover Guía ✥ Activo");
}
});
});
guideClose.addEventListener('click', () => guideBox.style.display = 'none');
document.addEventListener('click', () => sketchSelector.style.display = 'none');

function updateBrushSettings() {
const activeCtx = currentLayer === 'A' ? layerACtx : layerBCtx;
activeCtx.lineCap = 'round'; activeCtx.lineJoin = 'round'; activeCtx.lineWidth = currentSize;
if (isEraser) {
activeCtx.strokeStyle = paperStyleIndex === 3 ? '#1e1e24' : (paperStyleIndex === 2 ? '#f5ebd6' : '#ffffff');
brushPreview.style.backgroundColor = '#ffffff'; brushPreview.style.border = '1px solid #ccc';
} else {
activeCtx.strokeStyle = hexToRgba(currentColor, currentOpacity);
brushPreview.style.backgroundColor = currentColor; brushPreview.style.border = 'none'; brushPreview.style.opacity = currentOpacity;
}
brushPreview.style.transform = `scale(${0.3 + (currentSize / 50)})`;
}

function hexToRgba(hex, alpha) {
const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

function saveState() {
if (undoStack.length >= MAX_HISTORY) undoStack.shift();
undoStack.push({ a: layerACv.toDataURL(), b: layerBCv.toDataURL() }); redoStack = [];
btnUndo.disabled = undoStack.length <= 1; btnRedo.disabled = true;
}

function updateLocalStorageBackup() {
try { localStorage.setItem(STORAGE_KEY_A, layerACv.toDataURL()); localStorage.setItem(STORAGE_KEY_B, layerBCv.toDataURL()); } catch(e) {}
}

function loadLocalStorageBackup() {
try {
const backupA = localStorage.getItem(STORAGE_KEY_A); const backupB = localStorage.getItem(STORAGE_KEY_B);
if (backupA && backupB) {
const imgA = new Image(), imgB = new Image(); let ready = 0;
const check = () => { ready++; if(ready===2){ layerACtx.drawImage(imgA,0,0); layerBCtx.drawImage(imgB,0,0); renderAll(); saveState(); }};
imgA.src = backupA; imgA.onload = check; imgB.src = backupB; imgB.onload = check;
}
} catch(e) {}
}

function restoreFromHistory(state) {
const imgA = new Image(), imgB = new Image(); let loadedCount = 0;
const onImgLoad = () => { loadedCount++; if (loadedCount === 2) { layerACtx.clearRect(0,0,canvas.width,canvas.height); layerBCtx.clearRect(0,0,canvas.width,canvas.height); layerACtx.drawImage(imgA, 0, 0); layerBCtx.drawImage(imgB, 0, 0); renderAll(); updateLocalStorageBackup(); btnUndo.disabled = undoStack.length <= 1; btnRedo.disabled = redoStack.length === 0; } };
imgA.src = state.a; imgA.onload = onImgLoad; imgB.src = state.b; imgB.onload = onImgLoad;
}

btnUndo.addEventListener('click', () => { if (undoStack.length > 1) { redoStack.push(undoStack.pop()); restoreFromHistory(undoStack[undoStack.length - 1]); } });
btnRedo.addEventListener('click', () => { if (redoStack.length > 0) { const nextState = redoStack.pop(); undoStack.push(nextState); restoreFromHistory(nextState); } });

function getCoords(e) { const t = e.touches ? e.touches[0] : e; return { x: t.clientX - panX, y: t.clientY - panY, screenX: t.clientX, screenY: t.clientY }; }
function getDistance(t1, t2) { return Math.sqrt(Math.pow(t2.clientX - t1.clientX, 2) + Math.pow(t2.clientY - t1.clientY, 2)); }

function setAppMode(mode) {
currentAppMode = mode;
document.getElementById('btn-mode-draw').classList.toggle('active', mode === 'draw');
document.getElementById('btn-mode-pan').classList.toggle('active', mode === 'pan');
document.getElementById('btn-mode-sketch').classList.toggle('active', mode === 'sketch');
document.getElementById('btn-eyedropper').classList.toggle('active', mode === 'eyedropper');
}
document.getElementById('btn-mode-draw').addEventListener('click', () => setAppMode('draw'));
document.getElementById('btn-mode-pan').addEventListener('click', () => setAppMode('pan'));
document.getElementById('btn-mode-sketch').addEventListener('click', () => setAppMode('sketch'));
document.getElementById('btn-eyedropper').addEventListener('click', () => setAppMode('eyedropper'));

function setShapeMode(shape) {
currentShapeMode = shape;
document.getElementById('btn-shape-free').classList.toggle('active', shape === 'free');
document.getElementById('btn-shape-line').classList.toggle('active', shape === 'line');
document.getElementById('btn-shape-circle').classList.toggle('active', shape === 'circle');
setAppMode('draw');
}
document.getElementById('btn-shape-free').addEventListener('click', () => setShapeMode('free'));
document.getElementById('btn-shape-line').addEventListener('click', () => setShapeMode('line'));
document.getElementById('btn-shape-circle').addEventListener('click', () => setShapeMode('circle'));

document.getElementById('btn-toggle-sym').addEventListener('click', (e) => { symmetryActive = !symmetryActive; e.target.classList.toggle('active', symmetryActive); });
document.getElementById('btn-layer-toggle').addEventListener('click', (e) => { currentLayer = currentLayer === 'A' ? 'B' : 'A'; e.target.innerText = `Capa: ${currentLayer}`; showToast(`Editando Capa ${currentLayer}`); updateBrushSettings(); });
document.getElementById('btn-paper-toggle').addEventListener('click', () => { paperStyleIndex = (paperStyleIndex + 1) % 4; renderAll(); });

function startInteraction(e) {
if (e.target.closest('#toolbar') || e.target.closest('#top-bar') || e.target.closest('#sketch-selector') || e.target.closest('#guide-box') || e.target.closest('#btn-restore-ui')) return;
const c = getCoords(e);

if (currentAppMode === 'sketch') {
if (e.touches && e.touches.length === 2) {
initialPinchDist = getDistance(e.touches[0], e.touches[1]);
initialSketchScale = currentSketch.scale;
isPinching = true; isDraggingSketch = false;
} else {
isDraggingSketch = true;
startPanX = c.screenX - currentSketch.x; startPanY = c.screenY - currentSketch.y;
}
return;
}

if (currentAppMode === 'pan') { isDrawing = false; startPanX = c.screenX - panX; startPanY = c.screenY - panY; return; }
if (currentAppMode === 'eyedropper') { executeEyedropper(c.screenX, c.screenY); return; }

isDrawing = true; lastX = c.x; lastY = c.y; points = [c];
if (!isZenMode) { toolbar.classList.add('hidden'); topBar.classList.add('hidden'); }
}

function moveInteraction(e) {
const c = getCoords(e);
if (currentAppMode === 'sketch') {
if (isPinching && e.touches && e.touches.length === 2) {
const newDist = getDistance(e.touches[0], e.touches[1]);
currentSketch.scale = initialSketchScale * (newDist / initialPinchDist);
redrawSketchLayer(); renderAll();
} else if (isDraggingSketch) {
currentSketch.x = c.screenX - startPanX; currentSketch.y = c.screenY - startPanY;
redrawSketchLayer(); renderAll();
}
return;
}
if (currentAppMode === 'pan' && startPanX !== 0) { panX = c.screenX - startPanX; panY = c.screenY - startPanY; renderAll(); return; }
if (!isDrawing) return;
const activeCtx = currentLayer === 'A' ? layerACtx : layerBCtx;

points.push(c);
if (currentShapeMode === 'free') {
activeCtx.beginPath(); activeCtx.moveTo(lastX, lastY);
let targetX = (points[points.length - 2].x + c.x) / 2; let targetY = (points[points.length - 2].y + c.y) / 2;
activeCtx.quadraticCurveTo(points[points.length - 2].x, points[points.length - 2].y, targetX, targetY); activeCtx.stroke();
if (symmetryActive) {
const mid = canvas.width / 2;
let symLastX = mid - (lastX - mid); let symTargetX = mid - (targetX - mid); let symControlX = mid - (points[points.length - 2].x - mid);
activeCtx.beginPath(); activeCtx.moveTo(symLastX, lastY); activeCtx.quadraticCurveTo(symControlX, points[points.length - 2].y, symTargetX, targetY); activeCtx.stroke();
}
lastX = targetX; lastY = targetY; renderAll();
} else {
renderAll(); ctx.save(); ctx.translate(panX, panY); ctx.lineCap = 'round'; ctx.lineWidth = currentSize;
ctx.strokeStyle = isEraser ? (paperStyleIndex === 3 ? '#1e1e24' : (paperStyleIndex === 2 ? '#f5ebd6' : '#ffffff')) : hexToRgba(currentColor, currentOpacity);
const startPt = points[0];
if (currentShapeMode === 'line') {
ctx.beginPath(); ctx.moveTo(startPt.x, startPt.y); ctx.lineTo(c.x, c.y); ctx.stroke();
if (symmetryActive) { const mid = canvas.width / 2; ctx.beginPath(); ctx.moveTo(mid - (startPt.x - mid), startPt.y); ctx.lineTo(mid - (c.x - mid), c.y); ctx.stroke(); }
} else if (currentShapeMode === 'circle') {
const r = Math.sqrt(Math.pow(c.x - startPt.x, 2) + Math.pow(c.y - startPt.y, 2));
ctx.beginPath(); ctx.arc(startPt.x, startPt.y, r, 0, 2 * Math.PI); ctx.stroke();
if (symmetryActive) { const mid = canvas.width / 2; ctx.beginPath(); ctx.arc(mid - (startPt.x - mid), startPt.y, r, 0, 2 * Math.PI); ctx.stroke(); }
}
ctx.restore();
}
}

function stopInteraction() {
startPanX = 0; startPanY = 0; isDraggingSketch = false; isPinching = false;
if (!isDrawing) return; isDrawing = false;
const activeCtx = currentLayer === 'A' ? layerACtx : layerBCtx;
const startPt = points[0]; const endPt = points[points.length - 1];
if (currentShapeMode === 'line') {
activeCtx.beginPath(); activeCtx.moveTo(startPt.x, startPt.y); activeCtx.lineTo(endPt.x, endPt.y); activeCtx.stroke();
if (symmetryActive) { const mid = canvas.width / 2; activeCtx.beginPath(); activeCtx.moveTo(mid - (startPt.x - mid), startPt.y); activeCtx.lineTo(mid - (endPt.x - mid), endPt.y); activeCtx.stroke(); }
} else if (currentShapeMode === 'circle' && points.length > 1) {
const r = Math.sqrt(Math.pow(endPt.x - startPt.x, 2) + Math.pow(endPt.y - startPt.y, 2));
activeCtx.beginPath(); activeCtx.arc(startPt.x, startPt.y, r, 0, 2 * Math.PI); activeCtx.stroke();
if (symmetryActive) { const mid = canvas.width / 2; activeCtx.beginPath(); activeCtx.arc(mid - (startPt.x - mid), startPt.y, r, 0, 2 * Math.PI); }
}
saveState(); updateLocalStorageBackup(); renderAll();
if (!isZenMode) { toolbar.classList.remove('hidden'); topBar.classList.remove('hidden'); }
}

function executeEyedropper(screenX, screenY) {
const pixel = ctx.getImageData(screenX, screenY, 1, 1).data;
currentColor = "#" + ((1 << 24) + (pixel[0] << 16) + (pixel[1] << 8) + pixel[2]).toString(16).slice(1);
setAppMode('draw'); isEraser = false; btnEraser.classList.remove('active'); updateBrushSettings(); showToast("Color clonado 👁️‍🗨️");
}

canvas.addEventListener('mousedown', startInteraction); canvas.addEventListener('mousemove', moveInteraction); window.addEventListener('mouseup', stopInteraction);
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startInteraction(e); }, { passive: false });
canvas.addEventListener('touchmove', (e) => { e.preventDefault(); moveInteraction(e); }, { passive: false });
window.addEventListener('touchend', stopInteraction);

canvas.addEventListener('wheel', (e) => {
if (currentAppMode === 'sketch' && currentSketch.type) {
e.preventDefault(); const scaleAmount = e.deltaY > 0 ? 0.9 : 1.1; currentSketch.scale *= scaleAmount; redrawSketchLayer(); renderAll();
}
}, { passive: false });

colorSwatches.forEach(swatch => { swatch.addEventListener('click', () => { isEraser = false; btnEraser.classList.remove('active'); document.querySelector('.color-swatch.active')?.classList.remove('active'); swatch.classList.add('active'); currentColor = swatch.getAttribute('data-color'); setAppMode('draw'); updateBrushSettings(); }); });
customColor.addEventListener('input', (e) => { isEraser = false; btnEraser.classList.remove('active'); document.querySelector('.color-swatch.active')?.classList.remove('active'); currentColor = e.target.value; setAppMode('draw'); updateBrushSettings(); });
sizeSlider.addEventListener('input', (e) => { currentSize = e.target.value; updateBrushSettings(); });
opacitySlider.addEventListener('input', (e) => { currentOpacity = e.target.value / 100; updateBrushSettings(); });

btnEraser.addEventListener('click', () => { isEraser = !isEraser; btnEraser.classList.toggle('active', isEraser); updateBrushSettings(); });
btnClear.addEventListener('click', () => { if (confirm('¿Limpiar capa actual?')) { const activeCtx = currentLayer === 'A' ? layerACtx : layerBCtx; activeCtx.clearRect(0, 0, canvas.width, canvas.height); saveState(); updateLocalStorageBackup(); renderAll(); } });

btnSave.addEventListener('click', async () => {
const exportCanvas = document.createElement('canvas'); exportCanvas.width = canvas.width; exportCanvas.height = canvas.height; const exportCtx = exportCanvas.getContext('2d');
if (paperStyleIndex === 0 || paperStyleIndex === 1) { exportCtx.fillStyle = '#ffffff'; exportCtx.fillRect(0,0,canvas.width,canvas.height); }
else if (paperStyleIndex === 2) { exportCtx.fillStyle = '#f5ebd6'; exportCtx.fillRect(0,0,canvas.width,canvas.height); }
else if (paperStyleIndex === 3) { exportCtx.fillStyle = '#1e1e24'; exportCtx.fillRect(0,0,canvas.width,canvas.height); }
if (currentSketch.type) { exportCtx.drawImage(sketchCv, 0, 0); }
exportCtx.drawImage(layerACv, 0, 0); exportCtx.drawImage(layerBCv, 0, 0);
const dataUrl = exportCanvas.toDataURL('image/png');
if (navigator.canShare && navigator.share) {
try { const res = await fetch(dataUrl); const blob = await res.blob(); const file = new File([blob], `arte-${new Date().toISOString().slice(0,10)}.png`, { type: 'image/png' }); await navigator.share({ files: [file], title: 'Mi Obra de Arte' }); } catch (err) {} } else { const link = document.createElement('a'); link.download =`arte-${new Date().toISOString().slice(0,10)}.png`; link.href = dataUrl; link.click(); showToast("¡Guardado! ✨"); }
});

function showToast(msg) { toast.innerText = msg; toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 2800); }
window.addEventListener('resize', resizeCanvas);
</script>
